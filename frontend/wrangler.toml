name = "ppp-newsletter-frontend"
compatibility_date = "2024-01-15"

# Pages configuration for production build
pages_build_output_dir = "dist"

[env.production]
compatibility_date = "2024-01-15"

# Environment variables for frontend
[env.production.vars]
VITE_API_BASE_URL = "https://newsletter.preciouspicspro.com"
VITE_LOG_LEVEL = "warn"
VITE_UNSUBSCRIBE_WEBHOOK = "https://billing.preciouspicspro.com/newsletter/api/unsubscribe"

[env.development]
compatibility_date = "2024-01-15"

[env.development.vars]
VITE_API_BASE_URL = "http://localhost:3300"
VITE_LOG_LEVEL = "debug"
VITE_UNSUBSCRIBE_WEBHOOK = "http://localhost:3300/newsletter/api/unsubscribe"